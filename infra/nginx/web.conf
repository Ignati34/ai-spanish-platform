server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers (static + SPA) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://telegram.org; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:; connect-src 'self' https://telegram.org; font-src 'self' data:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # --- Public AI-SEO surface (server-rendered by the API) ---
    location = /robots.txt   { proxy_pass http://api:8000/robots.txt; proxy_set_header Host $host; }
    location = /sitemap.xml  { proxy_pass http://api:8000/sitemap.xml; proxy_set_header Host $host; }
    location = /llms.txt     { proxy_pass http://api:8000/llms.txt; proxy_set_header Host $host; }
    location /learn {
        proxy_pass http://api:8000/learn;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse-proxy the API (same-origin => no CORS needed in production)
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback (the React app lives under /app and the root)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
