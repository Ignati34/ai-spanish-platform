# Full stack for a web-service deployment.
# Usage: docker compose -f infra/compose/docker-compose.yml --env-file .env up --build
services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        VITE_API_URL: ""      # same-origin: nginx proxies /api -> api:8000
    depends_on:
      - api
    ports:
      - "8080:80"

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    env_file:
      - ../../.env
    depends_on:
      - api
      - postgres
      - redis
      - minio

  scheduler:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    command: python -m app.workers.scheduler
    env_file:
      - ../../.env
    depends_on:
      - postgres
      - redis

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: spanish_ai
      POSTGRES_USER: spanish_ai
      POSTGRES_PASSWORD: spanish_ai_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spanish_ai -d spanish_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  postgres_data:
  minio_data:
